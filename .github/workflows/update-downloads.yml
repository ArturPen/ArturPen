name: Update Total Downloads Counter

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-counter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Calculate Total Downloads
        id: calc
        run: |
          echo "=== Fetching releases directly ==="
          
          RELEASES=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/ArturPen/angry-birds-transformers-farmer/releases")
        
          if echo "$RELEASES" | jq -e '.message' >/dev/null 2>&1; then
            echo "Error: GitHub API returned an error message."
            echo "$RELEASES"
            echo "total=0" >> $GITHUB_OUTPUT
          else
            TOTAL=$(echo "$RELEASES" | jq '[.[]? | .assets[]?.download_count] | add // 0' 2>/dev/null)
            
            echo "=== Final Calculation for ABTFarmer: $TOTAL ==="
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
          fi
          
      - name: Generate JSON for Badge
        run: |
          echo '{"schemaVersion": 1, "label": "Total Downloads", "message": "'"${{ steps.calc.outputs.total }}"'", "color": "bb9af7", "labelColor": "1a1b26", "style": "for-the-badge"}' > downloads-counter.json

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads-counter.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update total downloads counter" && git push)
