name: Update Total Downloads Counter

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-counter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Calculate Total Downloads
        id: calc
        run: |
          REPOS=$(curl -s "https://api.github.com/users/ArturPen/repos?per_page=100")
          
          if [ -z "$REPOS" ] || echo "$REPOS" | grep -q "message"; then
            echo "total=0" >> $GITHUB_OUTPUT
          else
            TOTAL=$(echo "$REPOS" | jq '[.[] | select(.has_downloads==true) | .name] | .[]' 2>/dev/null | xargs -I {} curl -s "https://api.github.com/repos/ArturPen/{}/releases" | jq '[.[]? | .assets[]?.download_count] | add // 0' 2>/dev/null | awk '{s+=$1} END {print s+0}')
            echo "Total downloads calculated: $TOTAL"
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
          fi

      - name: Generate JSON for Badge
        run: |
          echo '{"schemaVersion": 1, "label": "Total Downloads", "message": "'"${{ steps.calc.outputs.total }}"'", "color": "bb9af7", "labelColor": "1a1b26", "style": "for-the-badge"}' > downloads-counter.json

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads-counter.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update total downloads counter" && git push)
