name: Update Total Downloads Counter

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-counter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Calculate Total Downloads
        id: calc
        run: |
          echo "=== Fetching repositories ==="
          REPOS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/users/ArturPen/repos?per_page=100")
          
          echo "GitHub API response (first 10 lines):"
          echo "$REPOS" | head -n 10
          
          FIRST_CHAR=$(echo "$REPOS" | cut -c1)
          
          if [ "$FIRST_CHAR" != "[" ]; then
            echo "Error: API did not return an array. Possible rate limit or token issue."
            echo "total=0" >> $GITHUB_OUTPUT
          else
            NAMES=$(echo "$REPOS" | jq -r '.[] | select(.has_downloads==true) | .name')
            echo "Found repositories to check: $NAMES"
            
            TOTAL=0
            for REPO in $NAMES; do
              echo "Checking releases for repository: $REPO"
              RELEASES=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/ArturPen/$REPO/releases")
              
              COUNT=$(echo "$RELEASES" | jq '[.[]? | .assets[]?.download_count] | add // 0' 2>/dev/null)
              echo "Downloads in $REPO: $COUNT"
              
              TOTAL=$((TOTAL + COUNT))
            done
            
            echo "=== Final Calculation: $TOTAL ==="
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
          fi

      - name: Generate JSON for Badge
        run: |
          echo '{"schemaVersion": 1, "label": "Total Downloads", "message": "'"${{ steps.calc.outputs.total }}"'", "color": "bb9af7", "labelColor": "1a1b26", "style": "for-the-badge"}' > downloads-counter.json

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads-counter.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update total downloads counter" && git push)
