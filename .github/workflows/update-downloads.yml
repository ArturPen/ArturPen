name: Update Total Downloads Counter

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-counter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Calculate Total Downloads
        id: calc
        run: |
          TOTAL=$(curl -s "https://api.github.com/users/ArturPen/repos?per_page=100" | jq '[.[] | select(.has_downloads==true) | .name] | .[]' | xargs -I {} curl -s "https://api.github.com/repos/ArturPen/{}/releases" | jq '[.[]? | .assets[]?.download_count] | add // 0')
          echo "Total downloads: $TOTAL"
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

      - name: Generate JSON for Badge
        run: |
          echo '{"schemaVersion": 1, "label": "Total Downloads", "message": "'"${{ steps.calc.outputs.total }}"'", "color": "bb9af7", "labelColor": "1a1b26", "style": "for-the-badge"}' > downloads-counter.json

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads-counter.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update total downloads counter" && git push)
